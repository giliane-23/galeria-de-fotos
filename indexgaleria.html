<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Fotos</title>

</head>

<body>
    <header>
        <h1>Minha Galeria</h1>

    <main class="galeria">
        <img src="img/IMG_9282.jpg" onclick="abrirModal(this)">

        <img src="img/IMG_9336.jpg" onclick="abrirModal(this)">

    <!-- MODAL -->
    <div id="modal" class="modal">
        <span class="fechar" onclick="fecharModal()">&times;</span>

        <button class="nav anterior" onclick="imagemAnterior()">&#10094;</button>

        <img class="modal-img" id="imgModal">

        <button class="nav proximo" onclick="proximaImagem()">&#10095;</button>
    </div>

    <script src="script.js"></script>
